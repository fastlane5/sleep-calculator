    <script>
        // 글로벌 상태 관리 (단위: 분 / 낮 12시 = 0)
        // 기본값: 8시간 30분(510분) 수면, 취침 오후 10시 00분(600) -> 기상 오전 6시 30분(1110)
        const state = {
            bedtimeMinutes: 600, 
            durationMinutes: 510 
        };

        const TOTAL_MINUTES = 1440; // 24시간
        const SNAP_MINUTES = 10;   // 10분 단위 스냅

        // DOM 요소 획득
        const bodyBg = document.getElementById('dynamic-bg');
        const glow1 = document.getElementById('glow-1');
        const glow2 = document.getElementById('glow-2');
        const thumb = document.getElementById('sleep-thumb');
        const resizer = document.getElementById('sleep-resizer');
        const track = document.getElementById('timeline-track');
        const durationSlider = document.getElementById('duration-slider');
        
        const bedtimeDisplay = document.getElementById('bedtime-display');
        const waketimeDisplay = document.getElementById('waketime-display');
        const durationText = document.getElementById('duration-text');
        const targetDurationDisplay = document.getElementById('target-duration-display');
        
        const recommendBadge = document.getElementById('recommend-badge');
        const durationBadgeAlert = document.getElementById('duration-badge-alert');
        const dateDisplay = document.getElementById('date-display');
        const sunriseDisplay = document.getElementById('sunrise-display');

        // 달 관련 DOM 요소
        const moonSvgPath = document.getElementById('moon-light-path');
        const moonContainer = document.getElementById('sky-moon');
        const moonGlow = document.getElementById('moon-glow');
        const moonPhaseNameDisplay = document.getElementById('moon-phase-name');
        const moonAltDisplay = document.getElementById('moon-alt-display');

        // 내일 날짜 계산기
        let tomorrowGlobal = new Date();
        function initTomorrowDate() {
            tomorrowGlobal = new Date();
            tomorrowGlobal.setDate(tomorrowGlobal.getDate() + 1);
            
            const year = tomorrowGlobal.getFullYear();
            const month = tomorrowGlobal.getMonth() + 1;
            const date = tomorrowGlobal.getDate();
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            const dayOfWeek = dayNames[tomorrowGlobal.getDay()];
            
            dateDisplay.textContent = `${year}년 ${month}월 ${date}일 (${dayOfWeek})`;
            sunriseDisplay.textContent = "오전 05:22";
        }

        // --- 천문학적 달 위상(Moon Phase) 계산 함수 ---
        function calculateMoonPhase(date) {
            let year = date.getFullYear();
            let month = date.getMonth() + 1;
            let day = date.getDate();

            if (month < 3) {
                year--;
                month += 12;
            }
            month++;

            const c = 365.25 * year;
            const e = 30.6 * month;
            let jd = c + e + day - 694039.09; 
            jd /= 29.5305882; 
            let b = Math.floor(jd);
            let phase = jd - b; 
            return phase;
        }

        function getMoonPhaseName(phase) {
            if (phase < 0.03 || phase > 0.97) return "삭 (신월)";
            if (phase >= 0.03 && phase < 0.22) return "초승달";
            if (phase >= 0.22 && phase < 0.28) return "상현달";
            if (phase >= 0.28 && phase < 0.47) return "차오르는 달";
            if (phase >= 0.47 && phase < 0.53) return "보름달 (망)";
            if (phase >= 0.53 && phase < 0.72) return "이지러지는 달";
            if (phase >= 0.72 && phase < 0.78) return "하현달";
            return "그믐달";
        }

        function updateMoonSvg(phase) {
            const r = 45; 
            const cx = 50;
            const cy = 50;
            
            if (phase < 0.02 || phase > 0.98) {
                moonSvgPath.setAttribute("d", ""); 
                return;
            }
            if (phase > 0.48 && phase < 0.52) {
                moonSvgPath.setAttribute("d", `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx} ${cy + r} A ${r} ${r} 0 1 1 ${cx} ${cy - r}`);
                return;
            }

            let rx = r;
            if (phase < 0.5) {
                if (phase < 0.25) {
                    rx = r * (1 - 4 * phase);
                    moonSvgPath.setAttribute("d", `M 50 5 A 45 45 0 0 1 50 95 A ${rx} 45 0 0 0 50 5`);
                } else {
                    rx = r * (4 * phase - 1);
                    moonSvgPath.setAttribute("d", `M 50 5 A 45 45 0 0 1 50 95 A ${rx} 45 0 0 1 50 5`);
                }
            } else {
                const p = phase - 0.5;
                if (p < 0.25) {
                    rx = r * (1 - 4 * p);
                    moonSvgPath.setAttribute("d", `M 50 5 A 45 45 0 0 0 50 95 A ${rx} 45 0 0 1 50 5`);
                } else {
                    rx = r * (4 * p - 1);
                    moonSvgPath.setAttribute("d", `M 50 5 A 45 45 0 0 0 50 95 A ${rx} 45 0 0 0 50 5`);
                }
            }
        }

        function formatTime(minutesFromNoon) {
            let absoluteMinutes = (12 * 60 + minutesFromNoon) % 1440;
            if (absoluteMinutes < 0) absoluteMinutes += 1440;

            const hours24 = Math.floor(absoluteMinutes / 60);
            const mins = Math.floor(absoluteMinutes % 60);
            
            const period = hours24 >= 12 ? '오후' : '오전';
            let displayHours = hours24 % 12;
            if (displayHours === 0) displayHours = 12;

            const displayMins = mins.toString().padStart(2, '0');
            return `${period} ${displayHours}:${displayMins}`;
        }

        function formatDuration(minutes) {
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            if (m === 0) return `${h}h`;
            return `${h}h ${m}m`; // 모바일 대응을 위해 텍스트 길이 최소화 (시간->h, 분->m)
        }

        function formatTargetDuration(minutes) {
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            if (m === 0) return `${h}시간`;
            return `${h}시간 ${m}분`; 
        }

        // 배경 그라데이션 인터폴레이션 로직
        function hexToRgb(hex) {
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);
            return [r, g, b];
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function interpolateColor(color1, color2, factor) {
            const rgb1 = hexToRgb(color1);
            const rgb2 = hexToRgb(color2);
            
            const r = Math.round(rgb1[0] + factor * (rgb2[0] - rgb1[0]));
            const g = Math.round(rgb1[1] + factor * (rgb2[1] - rgb1[1]));
            const b = Math.round(rgb1[2] + factor * (rgb2[2] - rgb1[2]));
            
            return rgbToHex(r, g, b);
        }

        function updateSkyAndMoon(wakeMinutesFromNoon) {
            let absMins = (12 * 60 + wakeMinutesFromNoon) % 1440;
            if (absMins < 0) absMins += 1440;

            let bgStart, bgMid, bgEnd;
            let glow1Color, glow2Color;
            let skyState = "night"; 

            // 야간 (20:30 ~ 23:59)
            if (absMins >= 1230 && absMins <= 1439) {
                bgStart = "#01030a";
                bgMid = "#040712";
                bgEnd = "#070c18";
                glow1Color = "rgba(79, 70, 229, 0.05)";
                glow2Color = "rgba(147, 51, 234, 0.05)";
                skyState = "dark-night";
            }
            // 깊은 새벽 (00:00 ~ 04:00)
            else if (absMins < 240) {
                bgStart = "#020617";
                bgMid = "#070b19";
                bgEnd = "#0f1129";
                glow1Color = "rgba(99, 102, 241, 0.08)";
                glow2Color = "rgba(168, 85, 247, 0.08)";
                skyState = "night";
            } 
            // 여명 (04:00 ~ 05:22)
            else if (absMins < 322) {
                const factor = (absMins - 240) / (322 - 240);
                bgStart = interpolateColor("#020617", "#0a0a26", factor);
                bgMid = interpolateColor("#070b19", "#1b113a", factor);
                bgEnd = interpolateColor("#0f1129", "#3b1342", factor);
                glow1Color = `rgba(139, 92, 246, ${0.08 + factor * 0.1})`;
                glow2Color = `rgba(236, 72, 153, ${0.08 + factor * 0.1})`;
                skyState = "dawn";
            } 
            // 일출 (05:22 ~ 07:00)
            else if (absMins < 420) {
                const factor = (absMins - 322) / (420 - 322);
                bgStart = interpolateColor("#0a0a26", "#1c1445", factor);
                bgMid = interpolateColor("#1b113a", "#5b1845", factor);
                bgEnd = interpolateColor("#3b1342", "#c7501e", factor);
                glow1Color = `rgba(249, 115, 22, ${0.18 - factor * 0.05})`;
                glow2Color = `rgba(236, 72, 153, ${0.18 - factor * 0.05})`;
                skyState = "sunrise";
            } 
            // 아침 (07:00 ~ 09:00)
            else if (absMins < 540) {
                const factor = (absMins - 420) / (540 - 420);
                bgStart = interpolateColor("#1c1445", "#0b1c3d", factor);
                bgMid = interpolateColor("#5b1845", "#0284c7", factor);
                bgEnd = interpolateColor("#c7501e", "#bae6fd", factor);
                glow1Color = "rgba(56, 189, 248, 0.15)";
                glow2Color = "rgba(253, 224, 71, 0.12)";
                skyState = "morning";
            } 
            // 화창한 낮
            else {
                bgStart = "#09142b";
                bgMid = "#0369a1";
                bgEnd = "#bae6fd";
                glow1Color = "rgba(14, 165, 233, 0.12)";
                glow2Color = "rgba(254, 240, 138, 0.12)";
                skyState = "daytime";
            }

            bodyBg.style.background = `linear-gradient(135deg, ${bgStart} 0%, ${bgMid} 50%, ${bgEnd} 100%)`;
            glow1.style.backgroundColor = glow1Color;
            glow2.style.backgroundColor = glow2Color;

            // 달 위치 렌더링
            const moonPhase = calculateMoonPhase(tomorrowGlobal);
            updateMoonSvg(moonPhase);
            moonPhaseNameDisplay.textContent = getMoonPhaseName(moonPhase);

            const transitHour = (24 * (1 - moonPhase) + 12) % 24;
            const hourOfWake = absMins / 60; 

            let diffHour = hourOfWake - transitHour;
            if (diffHour > 12) diffHour -= 24;
            if (diffHour < -12) diffHour += 24;

            const isMoonUp = Math.abs(diffHour) <= 6;

            if (isMoonUp && (skyState === "night" || skyState === "dark-night" || skyState === "dawn" || skyState === "sunrise")) {
                const horizontalPercent = 50 + (diffHour / 6) * 40; 
                const altitudeFactor = Math.cos((diffHour / 6) * (Math.PI / 2)); 
                const altitudeDeg = Math.round(altitudeFactor * 54); 
                const verticalPercent = 70 - (altitudeFactor * 55);

                moonContainer.style.opacity = "1";
                moonContainer.style.left = `${horizontalPercent}%`;
                moonContainer.style.top = `${verticalPercent}%`;
                moonGlow.style.opacity = `${0.3 + altitudeFactor * 0.7}`;

                const directionStr = diffHour < 0 ? "동" : (diffHour > 1.5 ? "서" : "남");
                moonAltDisplay.textContent = `고도 ${altitudeDeg}° (${directionStr})`;
            } else {
                moonContainer.style.opacity = "0";
                moonAltDisplay.textContent = "지평선 아래";
            }
        }

        // UI 갱신 함수
        function updateUI() {
            const wakeMin = state.bedtimeMinutes + state.durationMinutes;
            bedtimeDisplay.textContent = formatTime(state.bedtimeMinutes);
            waketimeDisplay.textContent = formatTime(wakeMin);
            
            // 모바일 잘림 방지: 뱃지 텍스트는 간소화 (h, m), 하단 타겟 표시는 한글(시간, 분) 유지
            durationText.textContent = formatDuration(state.durationMinutes) + " 수면";
            targetDurationDisplay.textContent = formatTargetDuration(state.durationMinutes);
            durationSlider.value = state.durationMinutes;

            const isRecommended = state.durationMinutes >= 420 && state.durationMinutes <= 540;
            if (isRecommended) {
                recommendBadge.className = "mb-1.5 text-[8px] sm:text-[10px] font-bold px-1.5 sm:px-2.5 py-0.5 rounded-full bg-emerald-500/20 text-emerald-300 border border-emerald-500/40 shadow-[0_0_12px_rgba(16,185,129,0.3)] whitespace-nowrap";
                recommendBadge.textContent = "💡 추천 수면 (7~9시간)";
                durationBadgeAlert.className = "hidden";
            } else {
                recommendBadge.className = "mb-1.5 text-[8px] sm:text-[10px] font-bold px-1.5 sm:px-2.5 py-0.5 rounded-full bg-slate-800 text-slate-500 border border-slate-700 whitespace-nowrap";
                recommendBadge.textContent = "일반 수면";
                if (state.durationMinutes < 420) {
                    durationBadgeAlert.className = "text-[9px] sm:text-[10px] font-bold px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-300 border border-amber-500/30";
                    durationBadgeAlert.textContent = "약간 부족";
                } else {
                    durationBadgeAlert.className = "text-[9px] sm:text-[10px] font-bold px-1.5 py-0.5 rounded bg-indigo-500/20 text-indigo-300 border border-indigo-500/30";
                    durationBadgeAlert.textContent = "여유로움";
                }
            }

            const leftPercent = (state.bedtimeMinutes / TOTAL_MINUTES) * 100;
            const widthPercent = (state.durationMinutes / TOTAL_MINUTES) * 100;
            
            thumb.style.left = `${leftPercent}%`;
            thumb.style.width = `${widthPercent}%`;

            updateSkyAndMoon(wakeMin);
        }

        // --- 슬라이더/드래그 로직 모듈 ---
        durationSlider.addEventListener('input', (e) => {
            const newDuration = parseInt(e.target.value);
            if (state.bedtimeMinutes + newDuration > TOTAL_MINUTES) {
                state.bedtimeMinutes = TOTAL_MINUTES - newDuration;
            }
            state.durationMinutes = newDuration;
            updateUI();
        });

        let dragCtx = null;
        let resizeCtx = null;

        function startDrag(e) {
            e.stopPropagation();
            const clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX);
            if (clientX === undefined) return;

            dragCtx = {
                startX: clientX,
                startBedtime: state.bedtimeMinutes,
                trackWidth: track.clientWidth
            };
            
            thumb.classList.remove('transition-all');
            document.body.style.cursor = 'grabbing';
        }

        function startResize(e) {
            e.stopPropagation();
            const clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX);
            if (clientX === undefined) return;

            resizeCtx = {
                startX: clientX,
                startDuration: state.durationMinutes,
                bedtime: state.bedtimeMinutes,
                trackWidth: track.clientWidth
            };

            thumb.classList.remove('transition-all');
            document.body.style.cursor = 'ew-resize';
        }

        function onMove(e) {
            const clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX);
            if (clientX === undefined) return;
            const currentTrackWidth = track.clientWidth;

            if (resizeCtx) {
                const deltaX = clientX - resizeCtx.startX;
                const deltaMinutes = (deltaX / currentTrackWidth) * TOTAL_MINUTES;
                let newDuration = resizeCtx.startDuration + deltaMinutes;

                newDuration = Math.round(newDuration / SNAP_MINUTES) * SNAP_MINUTES;
                newDuration = Math.max(360, Math.min(newDuration, 720));

                if (resizeCtx.bedtime + newDuration > TOTAL_MINUTES) {
                    newDuration = TOTAL_MINUTES - resizeCtx.bedtime;
                }

                state.durationMinutes = newDuration;
                updateUI();
                return;
            }

            if (dragCtx) {
                const deltaX = clientX - dragCtx.startX;
                const deltaMinutes = (deltaX / currentTrackWidth) * TOTAL_MINUTES;
                let newBedtime = dragCtx.startBedtime + deltaMinutes;

                newBedtime = Math.round(newBedtime / SNAP_MINUTES) * SNAP_MINUTES;

                const maxBedtime = TOTAL_MINUTES - state.durationMinutes;
                newBedtime = Math.max(0, Math.min(newBedtime, maxBedtime));

                state.bedtimeMinutes = newBedtime;
                updateUI();
            }
        }

        function endDrag() {
            if (dragCtx || resizeCtx) {
                dragCtx = null;
                resizeCtx = null;
                thumb.classList.add('transition-all');
                document.body.style.cursor = '';
            }
        }

        thumb.addEventListener('mousedown', startDrag);
        thumb.addEventListener('touchstart', startDrag, { passive: true });

        resizer.addEventListener('mousedown', startResize);
        resizer.addEventListener('touchstart', startResize, { passive: true });

        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, { passive: false });

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
        document.addEventListener('touchcancel', endDrag);

        track.addEventListener('click', (e) => {
            if (e.target === thumb || thumb.contains(e.target)) return;
            
            const rect = track.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            let targetBedtime = (clickX / rect.width) * TOTAL_MINUTES;
            
            targetBedtime -= state.durationMinutes / 2;
            targetBedtime = Math.round(targetBedtime / SNAP_MINUTES) * SNAP_MINUTES;
            
            const maxBedtime = TOTAL_MINUTES - state.durationMinutes;
            state.bedtimeMinutes = Math.max(0, Math.min(targetBedtime, maxBedtime));
            
            updateUI();
        });

        window.addEventListener('resize', updateUI);

        initTomorrowDate();
        updateUI();

    </script>
